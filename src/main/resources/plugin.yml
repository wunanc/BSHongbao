name: BSHongbao
version: ${version}
main: top.wunanc.bSHongbao.BSHongbao
api-version: '1.21'
authors: [ Hotguo ]
description: A plugin that provides a 'red envelope' feature for Minecraft servers, supporting both regular red envelopes and lucky draw red envelopes. It integrates with Vault economy, comes with a visual GUI, and includes automatic expiration refunds and concurrency-safe design.
website: wunanc.top
depend: [Vault]

commands:
  BSHongbao:
    description: 'Open red packet GUI'
    usage: '/BSHongbao open'
    permission: bshongbao.use
    aliases: [hongbao, redpacket]

permissions:
  bshongbao.use:
    description: Default user permissions for this plugin
    default: true
  bshongbao.admin:
    description: Administrator permissions for this plugin
    default: op
